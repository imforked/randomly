# Postgres + API. Prisma schema applies via docker-entrypoint.sh (migrate deploy or db push).
#
# From this directory (server/):
#   docker compose up --build
#
# URL matches POSTGRES_* below. Override DATABASE_URL if needed.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: randomly
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d randomly"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://app:app@db:5432/randomly
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
